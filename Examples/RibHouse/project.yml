name: RibHouse
options:
  bundleIdPrefix: com.napkin.example
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
packages:
  napkin:
    path: ../..
  swift-snapshot-testing:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: "1.18.0"
targets:
  RibHouse:
    type: application
    platform: iOS
    sources:
      - path: Sources
    dependencies:
      - package: napkin
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleDisplayName: "Napkin's Rib House"
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        SWIFT_VERSION: "6.2"
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
        PRODUCT_BUNDLE_IDENTIFIER: com.napkin.example.RibHouse

  RibHouseUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
      - path: Sources/Shared/AccessibilityIdentifiers.swift
    dependencies:
      - target: RibHouse
    settings:
      base:
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        SWIFT_VERSION: "6.2"
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: com.napkin.example.RibHouseUITests
        TEST_TARGET_NAME: RibHouse

  RibHouseSnapshotTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SnapshotTests
    dependencies:
      - target: RibHouse
      - package: napkin
      - package: swift-snapshot-testing
        product: SnapshotTesting
    settings:
      base:
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        SWIFT_VERSION: "6.2"
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: com.napkin.example.RibHouseSnapshotTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/RibHouse.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/RibHouse"
        BUNDLE_LOADER: "$(TEST_HOST)"
