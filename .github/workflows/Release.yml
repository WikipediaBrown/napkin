name: Release
run-name: ${{ github.actor }} is creating a release.
on:
  push:
    branches:
    - main
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type. Defaults to patch when triggered by a push.'
        required: false
        default: 'patch'
        type: choice
        options:
        - patch
        - minor
        - major
jobs:
  release:
    name: Release napkin
    # macos-26 image ships Xcode 26 (Swift 6.2 / iOS 26 / macOS 26 SDKs).
    # Falls back to macos-latest if the labelled image is unavailable.
    runs-on: macos-26
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPOSITORY_NAME: ${{ github.repository }}
      DANGER_GITHUB_API_TOKEN: ${{secrets.GITHUB_TOKEN }}
      BUMP: ${{ inputs.bump || 'patch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
      - name: Create Release Tag
        run: bundle exec fastlane release_to_github
