name: Release
run-name: ${{ github.actor }} is creating a release.
on:
  push:
    branches:
    - main
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type. Defaults to patch when triggered by a push.'
        required: false
        default: 'patch'
        type: choice
        options:
        - patch
        - minor
        - major
jobs:
  release:
    name: Release napkin
    # macos-26 image ships Xcode 26 (Swift 6.2 / iOS 26 / macOS 26 SDKs).
    # Falls back to macos-latest if the labelled image is unavailable.
    runs-on: macos-26
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPOSITORY_NAME: ${{ github.repository }}
      DANGER_GITHUB_API_TOKEN: ${{secrets.GITHUB_TOKEN }}
      BUMP: ${{ inputs.bump || 'patch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Narrow remote refspec
        # Override `remote.origin.fetch` so subsequent `git fetch --tags`
        # calls (run by fastlane's `git_pull(only_tags: true)` inside
        # `create_next_version`) only target `main` instead of all
        # branches. On macos-26 APFS (case-insensitive), the long-stale
        # `CI` branch (file at .git/refs/remotes/origin/CI) collides with
        # `ci/...` namespaced branches (which need a directory at
        # .git/refs/remotes/origin/ci/), failing with
        # `error: some local refs could not be updated`. The narrowed
        # refspec sidesteps the collision entirely.
        run: |
          git config --local remote.origin.fetch '+refs/heads/main:refs/remotes/origin/main'
      - name: Select Xcode
        # Plain Apple tooling, no third-party action. Glob picks the highest
        # Xcode 26.x.y installed on the runner so a runner-image refresh
        # bumping the patch version doesn't break the workflow.
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app 2>/dev/null | grep -v -i beta | sort -V | tail -1)"
          xcodebuild -version
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
      - name: Create Release Tag
        run: bundle exec fastlane release_to_github
