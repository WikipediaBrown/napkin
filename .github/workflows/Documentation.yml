name: Documentation
on:
  # Run after the Release workflow finishes, so `git describe --tags` picks up
  # the freshly-pushed release tag instead of racing with it (the bug that
  # left 2.0.7 in the footer while Release was publishing 2.0.8 in parallel).
  workflow_run:
    workflows: [Release]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time. New deploys cancel in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: macos-26
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Always deploy from main. `workflow_run` fires Documentation
          # in the default branch's context (develop), but main is the
          # source of truth for the public site — we don't want develop
          # changes leaking out before they're merged to main.
          ref: main
          # Shallow. Deliberately NOT `fetch-depth: 0`: that triggers a
          # bulk fetch of every remote branch via refspec
          # `+refs/heads/*:refs/remotes/origin/*`. On macos-26 APFS
          # (case-insensitive), the long-stale `CI` branch (file) collides
          # with `ci/...` namespaced branches (would-be directory) and
          # the fetch dies with `error: some local refs could not be updated`.
          # We intentionally do NOT set `fetch-tags: true` here — empirically
          # the option is silently dropped on shallow checkouts (the fetch
          # log shows no `--tags` flag). Tags are fetched explicitly below
          # with a narrowed refspec.
          fetch-depth: 1

      - name: Fetch tags
        # Pull all tag refs + their commits ourselves, since actions/checkout's
        # `fetch-tags: true` doesn't fire on shallow checkouts. Narrow
        # `remote.origin.fetch` to `main` first so `git fetch --tags`
        # doesn't try to bulk-fetch every remote branch (which would hit
        # the same APFS case-collision as `fetch-depth: 0`). `--depth=1`
        # keeps each tag's history minimal — we only need the tagged
        # commit's tree to build its docs.
        run: |
          git config --local remote.origin.fetch '+refs/heads/main:refs/remotes/origin/main'
          git fetch --tags --force --depth=1 origin

      - name: Select Xcode
        # Plain Apple tooling, no third-party action. Glob picks the highest
        # Xcode 26.x.y installed on the runner so a runner-image refresh
        # bumping the patch version doesn't break the workflow.
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app 2>/dev/null | grep -v -i beta | sort -V | tail -1)"
          xcodebuild -version

      - name: Detect DocC content flag
        # Swift 6.3+ DocC can write each page's real title and full text into
        # its index.html (readable without JavaScript — which the crawlers
        # behind ChatGPT/Claude/Perplexity never run). The flag is marked
        # experimental, so detect support instead of assuming it: on an older
        # toolchain we simply build today's output.
        run: |
          if xcrun docc convert --help 2>/dev/null | grep -q -- '--experimental-transform-for-static-hosting-with-content'; then
            echo "DOCC_CONTENT_FLAG=--experimental-transform-for-static-hosting-with-content" >> "$GITHUB_ENV"
            echo "docc supports static-hosting-with-content: passing it"
          else
            echo "docc does not support static-hosting-with-content: building without it"
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Resolve version + version list
        # Capture both the "current" version (for the homepage footer) and the
        # list of versions to build (main + last 5 stable tags) BEFORE we do
        # any `git checkout` in the versioned-docs loop.
        #
        # We use `git tag --sort=-v:refname` instead of `git describe` because
        # the shallow checkout above has no ancestry path back to the latest
        # tag for `git describe` to walk. Sorting all tags by semver and
        # taking the head gives us the same answer without needing history.
        id: versions
        run: |
          VERSION=$(git tag -l --sort=-v:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          [ -z "$VERSION" ] && VERSION="main"
          REFS=$( ( echo "main"; git tag -l --sort=-v:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | head -5 ) | tr '\n' ' ' )
          ORIGINAL_REF=$(git rev-parse HEAD)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "refs=${REFS}" >> "$GITHUB_OUTPUT"
          echo "original_ref=${ORIGINAL_REF}" >> "$GITHUB_OUTPUT"
          echo "Resolved VERSION=${VERSION}"
          echo "Resolved REFS=${REFS}"
          echo "Resolved ORIGINAL_REF=${ORIGINAL_REF}"

      - name: Build DocC (latest)
        # Builds the latest version's docs into ./docs/ so the bare URL works:
        # https://getnapkin.to/documentation/napkin/
        # With a custom domain, GH Pages serves the artifact at the domain
        # root (not at /napkin/), so `--hosting-base-path` is omitted —
        # DocC then emits root-relative links instead of `/napkin/...`.
        # --experimental-enable-custom-templates picks up header.html from
        # the napkin.docc catalog so every docs page gets the same top nav.
        # --source-service / --source-service-base-url / --checkout-path wire
        # up "View source on GitHub" buttons on each symbol page. (Note:
        # source-link buttons render on symbol pages only, not on articles —
        # that's a DocC limitation.)
        run: |
          swift package --allow-writing-to-directory ./docs \
            generate-documentation \
            --target napkin \
            --disable-indexing \
            --transform-for-static-hosting \
            ${DOCC_CONTENT_FLAG} \
            --output-path ./docs \
            --experimental-enable-custom-templates \
            --source-service github \
            --source-service-base-url https://github.com/WikipediaBrown/napkin/blob/main \
            --checkout-path ${{ github.workspace }}

      - name: Build versioned docs
        # Builds main + last 5 stable tags into ./docs/<ref>/ so the URLs
        #   https://getnapkin.to/2.0.8/documentation/napkin/
        #   https://getnapkin.to/main/documentation/napkin/
        # resolve. Best-effort: if an old tag fails to build against the
        # current toolchain we log it and keep going.
        run: |
          git config --global user.email "ci@napkin"
          git config --global user.name "napkin CI"

          REFS="${{ steps.versions.outputs.refs }}"
          ORIGINAL_REF="${{ steps.versions.outputs.original_ref }}"

          for ref in $REFS; do
            echo "::group::Building docs for ${ref}"
            # Belt and suspenders: `fetch-tags: true` in the checkout step
            # pulls all tag refs, but the trees of tagged commits in a
            # shallow clone aren't guaranteed across git versions. Explicitly
            # fetch each non-main ref at depth 1 so `git checkout` and the
            # subsequent docs build always have the tree they need.
            if [ "$ref" != "main" ]; then
              git fetch --depth=1 origin "+refs/tags/${ref}:refs/tags/${ref}" 2>&1 | tail -2 || true
            fi
            if ! git checkout "$ref" 2>&1 | tail -2; then
              echo "::warning::failed to check out ${ref}, skipping"
              echo "::endgroup::"
              continue
            fi
            mkdir -p "docs/${ref}"
            if swift package --allow-writing-to-directory "docs/${ref}" \
                generate-documentation \
                --target napkin \
                --disable-indexing \
                --transform-for-static-hosting \
                ${DOCC_CONTENT_FLAG} \
                --hosting-base-path "${ref}" \
                --output-path "docs/${ref}" \
                --experimental-enable-custom-templates \
                --source-service github \
                --source-service-base-url "https://github.com/WikipediaBrown/napkin/blob/${ref}" \
                --checkout-path "${{ github.workspace }}" 2>&1 | tail -5; then
              echo '<script>window.location.href += "/documentation/napkin"</script>' > "docs/${ref}/index.html"
            else
              echo "::warning::failed to build docs for ${ref}"
              rm -rf "docs/${ref}"
            fi
            echo "::endgroup::"
          done

          # Return to the original ref so the rest of the workflow sees latest.
          git checkout "$ORIGINAL_REF" 2>&1 | tail -2

      - name: Copy homepage
        # Hand-crafted homepage replaces DocC's missing root index.html with
        # a real landing page (nav bar, hero, feature grid, footer). The
        # nav links into /documentation/napkin/ where DocC lives.
        # __NAPKIN_VERSION__ placeholders in index.html get stamped with the
        # latest git tag, and __VERSION_LINKS__ gets stamped with the list
        # of <option> elements built in the versioned-docs loop above.
        run: |
          cp Tools/site/styles.css docs/styles.css
          cp Tools/site/napkin-icon.png docs/napkin-icon.png
          cp Tools/site/napkin-icon@2x.png docs/napkin-icon@2x.png
          cp Tools/site/social-preview.png docs/social-preview.png
          cp Tools/site/rib-house-logged-out.png docs/rib-house-logged-out.png
          cp Tools/site/rib-house-logged-in.png docs/rib-house-logged-in.png
          # llms.txt — emerging convention for LLM-readable site maps.
          cp Tools/site/llms.txt docs/llms.txt
          # llms-full.txt — same shape but with every article body inlined,
          # generated from the .md files so it stays in sync with the catalog.
          {
            cat Tools/site/llms.txt
            echo
            echo "---"
            echo
            echo "# napkin (catalog root)"
            echo
            cat Sources/napkin/napkin.docc/napkin.md
            for article in Sources/napkin/napkin.docc/Articles/*.md; do
              name=$(basename "$article" .md)
              echo
              echo "---"
              echo
              echo "# Article: $name"
              echo
              cat "$article"
            done
          } > docs/llms-full.txt
          # Custom 404 page. GitHub Pages serves /404.html on any 404.
          cp Tools/site/404.html docs/404.html
          # FAQ page (FAQPage JSON-LD) + recipes cookbook (named patterns).
          mkdir -p docs/faq docs/recipes docs/changelog docs/about
          cp Tools/site/faq/index.html docs/faq/index.html
          cp Tools/site/about/index.html docs/about/index.html
          cp Tools/site/recipes/index.html docs/recipes/index.html
          # Changelog: generated fresh from CHANGELOG.md so the styled
          # /changelog/ page always mirrors the GitHub source of truth.
          python3 Tools/site/changelog.py CHANGELOG.md > docs/changelog/index.html
          # security.txt at the site ROOT (not /.well-known/). GitHub Pages
          # reserves the /.well-known/ namespace for its own ACME / domain
          # verification on custom domains and 404s anything else there
          # (and dot-paths aren't served under workflow deploys regardless).
          # /security.txt is the widely-accepted RFC 9116 fallback location.
          cp Tools/site/security.txt docs/security.txt
          # IndexNow key — must be publicly fetchable for the ping step below.
          cp Tools/site/indexnow-key.txt docs/indexnow-key.txt
          # Blog: 5 SEO-targeted long-form articles + listing page + Atom feed.
          # Hand-rolled HTML (no static-site-generator). Each post lives in
          # its own folder so the URL is `/blog/<slug>/`.
          mkdir -p docs/blog
          cp -R Tools/site/blog/. docs/blog/
          # Comparison pages + decision guide (Stage 2 content).
          mkdir -p docs/compare docs/when-to-use-napkin
          cp -R Tools/site/compare/. docs/compare/
          cp Tools/site/when-to-use-napkin/index.html docs/when-to-use-napkin/index.html

          VERSION="${{ steps.versions.outputs.version }}"
          REFS="${{ steps.versions.outputs.refs }}"

          # Build the list of <option> elements for the version dropdown.
          # Only include refs whose docs/<ref>/ directory actually exists —
          # this keeps the dropdown honest if a tag failed to build.
          VERSION_LINKS=""
          for ref in $REFS; do
            if [ -d "docs/${ref}" ]; then
              VERSION_LINKS="${VERSION_LINKS}<option value=\"/${ref}/documentation/napkin/\">${ref}</option>"
            fi
          done

          # sed: escape forward slashes in the replacement string with %.
          # Use # as the delimiter so URLs don't need escaping.
          sed \
            -e "s/__NAPKIN_VERSION__/${VERSION}/g" \
            -e "s#<!-- __VERSION_LINKS__ -->#${VERSION_LINKS}#g" \
            Tools/site/index.html > docs/index.html

          # sitemap.xml — generated from the assembled site so it can never
          # go stale. Must run after every page above has been copied in.
          python3 Tools/site/gen_sitemap.py docs > docs/sitemap.xml
          echo "sitemap: $(grep -c '<loc>' docs/sitemap.xml) URLs"
          # robots.txt — welcome AI crawlers, block the versioned doc copies
          # that actually built this run (same refs as the version dropdown).
          EXISTING_REFS=""
          for ref in $REFS; do
            if [ -d "docs/${ref}" ]; then EXISTING_REFS="${EXISTING_REFS} ${ref}"; fi
          done
          python3 Tools/site/gen_robots.py --disallow ${EXISTING_REFS} > docs/robots.txt

      - name: Write CNAME
        # GitHub Pages reads docs/CNAME to determine the custom domain.
        # Putting it in the deploy artifact (rather than setting it via the
        # Pages API) means the binding is owned by source control and
        # survives any accidental change to the Pages settings.
        run: echo "getnapkin.to" > docs/CNAME

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Ping IndexNow
        # Tells Bing (and other IndexNow engines) which URLs exist, right
        # after deploy — indexing in days instead of weeks. Google doesn't
        # support IndexNow; it discovers us via sitemap.xml. Best-effort:
        # a failed ping must never fail the deploy.
        run: |
          python3 - <<'PY' > /tmp/indexnow.json
          import json, re
          urls = re.findall(r"<loc>([^<]+)</loc>", open("docs/sitemap.xml").read())
          key = open("Tools/site/indexnow-key.txt").read().strip()
          print(json.dumps({
              "host": "getnapkin.to",
              "key": key,
              "keyLocation": "https://getnapkin.to/indexnow-key.txt",
              "urlList": urls,
          }))
          PY
          curl -sS -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data @/tmp/indexnow.json \
            -w "\nIndexNow HTTP %{http_code}\n" || echo "IndexNow ping failed (non-fatal)"
