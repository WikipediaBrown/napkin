name: Documentation
on:
  # Run after the Release workflow finishes, so `git describe --tags` picks up
  # the freshly-pushed release tag instead of racing with it (the bug that
  # left 2.0.7 in the footer while Release was publishing 2.0.8 in parallel).
  workflow_run:
    workflows: [Release]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time. New deploys cancel in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: macos-26
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Always deploy from main. `workflow_run` fires Documentation
          # in the default branch's context (develop), but main is the
          # source of truth for the public site â€” we don't want develop
          # changes leaking out before they're merged to main.
          ref: main
          # Shallow. Deliberately NOT `fetch-depth: 0`: that triggers a
          # bulk fetch of every remote branch via refspec
          # `+refs/heads/*:refs/remotes/origin/*`. On macos-26 APFS
          # (case-insensitive), the long-stale `CI` branch (file) collides
          # with `ci/...` namespaced branches (would-be directory) and
          # the fetch dies with `error: some local refs could not be updated`.
          # We intentionally do NOT set `fetch-tags: true` here â€” empirically
          # the option is silently dropped on shallow checkouts (the fetch
          # log shows no `--tags` flag). Tags are fetched explicitly below
          # with a narrowed refspec.
          fetch-depth: 1

      - name: Fetch tags
        # Pull all tag refs + their commits ourselves, since actions/checkout's
        # `fetch-tags: true` doesn't fire on shallow checkouts. Narrow
        # `remote.origin.fetch` to `main` first so `git fetch --tags`
        # doesn't try to bulk-fetch every remote branch (which would hit
        # the same APFS case-collision as `fetch-depth: 0`). `--depth=1`
        # keeps each tag's history minimal â€” we only need the tagged
        # commit's tree to build its docs.
        run: |
          git config --local remote.origin.fetch '+refs/heads/main:refs/remotes/origin/main'
          git fetch --tags --force --depth=1 origin

      - name: Select Xcode
        # Plain Apple tooling, no third-party action. Glob picks the highest
        # Xcode 26.x.y installed on the runner so a runner-image refresh
        # bumping the patch version doesn't break the workflow.
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app 2>/dev/null | grep -v -i beta | sort -V | tail -1)"
          xcodebuild -version

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Resolve version + version list
        # Capture both the "current" version (for the homepage footer) and the
        # list of versions to build (main + last 5 stable tags) BEFORE we do
        # any `git checkout` in the versioned-docs loop.
        #
        # We use `git tag --sort=-v:refname` instead of `git describe` because
        # the shallow checkout above has no ancestry path back to the latest
        # tag for `git describe` to walk. Sorting all tags by semver and
        # taking the head gives us the same answer without needing history.
        id: versions
        run: |
          VERSION=$(git tag -l --sort=-v:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          [ -z "$VERSION" ] && VERSION="main"
          REFS=$( ( echo "main"; git tag -l --sort=-v:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | head -5 ) | tr '\n' ' ' )
          ORIGINAL_REF=$(git rev-parse HEAD)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "refs=${REFS}" >> "$GITHUB_OUTPUT"
          echo "original_ref=${ORIGINAL_REF}" >> "$GITHUB_OUTPUT"
          echo "Resolved VERSION=${VERSION}"
          echo "Resolved REFS=${REFS}"
          echo "Resolved ORIGINAL_REF=${ORIGINAL_REF}"

      - name: Build DocC (latest)
        # Builds the latest version's docs into ./docs/ so the bare URL works:
        # https://wikipediabrown.github.io/napkin/documentation/napkin/
        # --experimental-enable-custom-templates picks up header.html from
        # the napkin.docc catalog so every docs page gets the same top nav.
        # --source-service / --source-service-base-url / --checkout-path wire
        # up "View source on GitHub" buttons on each symbol page. (Note:
        # source-link buttons render on symbol pages only, not on articles â€”
        # that's a DocC limitation.)
        run: |
          swift package --allow-writing-to-directory ./docs \
            generate-documentation \
            --target napkin \
            --disable-indexing \
            --transform-for-static-hosting \
            --hosting-base-path napkin \
            --output-path ./docs \
            --experimental-enable-custom-templates \
            --source-service github \
            --source-service-base-url https://github.com/WikipediaBrown/napkin/blob/main \
            --checkout-path ${{ github.workspace }}

      - name: Build versioned docs
        # Builds main + last 5 stable tags into ./docs/<ref>/ so the URLs
        #   https://wikipediabrown.github.io/napkin/2.0.8/documentation/napkin/
        #   https://wikipediabrown.github.io/napkin/main/documentation/napkin/
        # resolve. Best-effort: if an old tag fails to build against the
        # current toolchain we log it and keep going.
        run: |
          git config --global user.email "ci@napkin"
          git config --global user.name "napkin CI"

          REFS="${{ steps.versions.outputs.refs }}"
          ORIGINAL_REF="${{ steps.versions.outputs.original_ref }}"

          for ref in $REFS; do
            echo "::group::Building docs for ${ref}"
            # Belt and suspenders: `fetch-tags: true` in the checkout step
            # pulls all tag refs, but the trees of tagged commits in a
            # shallow clone aren't guaranteed across git versions. Explicitly
            # fetch each non-main ref at depth 1 so `git checkout` and the
            # subsequent docs build always have the tree they need.
            if [ "$ref" != "main" ]; then
              git fetch --depth=1 origin "+refs/tags/${ref}:refs/tags/${ref}" 2>&1 | tail -2 || true
            fi
            if ! git checkout "$ref" 2>&1 | tail -2; then
              echo "::warning::failed to check out ${ref}, skipping"
              echo "::endgroup::"
              continue
            fi
            mkdir -p "docs/${ref}"
            if swift package --allow-writing-to-directory "docs/${ref}" \
                generate-documentation \
                --target napkin \
                --disable-indexing \
                --transform-for-static-hosting \
                --hosting-base-path "napkin/${ref}" \
                --output-path "docs/${ref}" \
                --experimental-enable-custom-templates \
                --source-service github \
                --source-service-base-url "https://github.com/WikipediaBrown/napkin/blob/${ref}" \
                --checkout-path "${{ github.workspace }}" 2>&1 | tail -5; then
              echo '<script>window.location.href += "/documentation/napkin"</script>' > "docs/${ref}/index.html"
            else
              echo "::warning::failed to build docs for ${ref}"
              rm -rf "docs/${ref}"
            fi
            echo "::endgroup::"
          done

          # Return to the original ref so the rest of the workflow sees latest.
          git checkout "$ORIGINAL_REF" 2>&1 | tail -2

      - name: Copy homepage
        # Hand-crafted homepage replaces DocC's missing root index.html with
        # a real landing page (nav bar, hero, feature grid, footer). The
        # nav links into /napkin/documentation/napkin/ where DocC lives.
        # __NAPKIN_VERSION__ placeholders in index.html get stamped with the
        # latest git tag, and __VERSION_LINKS__ gets stamped with the list
        # of <option> elements built in the versioned-docs loop above.
        run: |
          cp Tools/site/styles.css docs/styles.css
          cp Tools/site/napkin-icon.png docs/napkin-icon.png
          cp Tools/site/napkin-icon@2x.png docs/napkin-icon@2x.png

          VERSION="${{ steps.versions.outputs.version }}"
          REFS="${{ steps.versions.outputs.refs }}"

          # Build the list of <option> elements for the version dropdown.
          # Only include refs whose docs/<ref>/ directory actually exists â€”
          # this keeps the dropdown honest if a tag failed to build.
          VERSION_LINKS=""
          for ref in $REFS; do
            if [ -d "docs/${ref}" ]; then
              VERSION_LINKS="${VERSION_LINKS}<option value=\"/napkin/${ref}/documentation/napkin/\">${ref}</option>"
            fi
          done

          # sed: escape forward slashes in the replacement string with %.
          # Use # as the delimiter so URLs don't need escaping.
          sed \
            -e "s/__NAPKIN_VERSION__/${VERSION}/g" \
            -e "s#<!-- __VERSION_LINKS__ -->#${VERSION_LINKS}#g" \
            Tools/site/index.html > docs/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
