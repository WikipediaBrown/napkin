name: Pull Request Against Develop
run-name: ${{ github.actor }} is creating a change to `develop`.
on:
  pull_request:
    branches:
    - develop
jobs:
  unit-tests:
    name: Unit Tests
    # macos-26 image ships Xcode 26 (Swift 6.2 / iOS 26 / macOS 26 SDKs).
    # Falls back to macos-latest if the labelled image is unavailable.
    runs-on: macos-26
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPOSITORY_NAME: ${{ github.event.repository.name }}
      DANGER_GITHUB_API_TOKEN: ${{secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Select Xcode
        # Plain Apple tooling, no third-party action. Glob picks the highest
        # Xcode 26.x.y installed on the runner so a runner-image refresh
        # bumping the patch version doesn't break the workflow.
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)"
          xcodebuild -version
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
      - name: Unit Tests
        run: bundle exec fastlane unit_test

  ui-tests:
    name: Example App UI Tests
    # Same runner image / Xcode toolchain as unit-tests; exercises the
    # LaunchNapkinApp end-to-end (3 napkins) via XCUITest on iPhone 17 sim.
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Select Xcode
        # Plain Apple tooling, no third-party action. Glob picks the highest
        # Xcode 26.x.y installed on the runner so a runner-image refresh
        # bumping the patch version doesn't break the workflow.
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)"
          xcodebuild -version
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate example app Xcode project
        working-directory: Examples/LaunchNapkinApp
        run: xcodegen
      - name: Example app UI tests
        working-directory: Examples/LaunchNapkinApp
        run: |
          xcodebuild \
            -project LaunchNapkinApp.xcodeproj \
            -scheme LaunchNapkinApp \
            -destination "platform=iOS Simulator,name=iPhone 17,OS=latest" \
            test
