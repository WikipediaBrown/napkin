name: Pull Request Against Develop
run-name: ${{ github.actor }} is creating a change to `develop`.
on:
  pull_request:
    branches:
    - develop
jobs:
  tests:
    name: Unit Tests
    # macos-26 image ships Xcode 26 (Swift 6.2 / iOS 26 / macOS 26 SDKs).
    # Falls back to macos-latest if the labelled image is unavailable.
    runs-on: macos-26
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPOSITORY_NAME: ${{ github.event.repository.name }}
      DANGER_GITHUB_API_TOKEN: ${{secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
      - name: Unit Tests
        run: bundle exec fastlane unit_test
