<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <!-- Background: paper tone with subtle grid (matches site palette) -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e9dfca" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="paperGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6f1e3"/>
      <stop offset="100%" stop-color="#efe4cc"/>
    </linearGradient>
    <linearGradient id="rule" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a2520" stop-opacity="0"/>
      <stop offset="50%" stop-color="#1a2520" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1a2520" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#paperGrad)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>

  <!-- Kicker -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="22" fill="#3a4a40" letter-spacing="2">
    <text x="96" y="120">§ 00 · THE FRAMEWORK</text>
  </g>

  <!-- Wordmark / serif "napkin" -->
  <text x="96" y="265" font-family="ui-serif, 'New York', 'Iowan Old Style', Georgia, serif" font-style="italic" font-size="148" font-weight="500" fill="#1a2520" letter-spacing="-3">napkin</text>

  <!-- Tagline -->
  <text x="96" y="345" font-family="ui-serif, 'New York', Georgia, serif" font-size="44" fill="#1a2520" letter-spacing="-0.5">
    Apps as a <tspan font-style="italic" fill="#356847">tree</tspan> of small,
  </text>
  <text x="96" y="400" font-family="ui-serif, 'New York', Georgia, serif" font-size="44" fill="#1a2520" letter-spacing="-0.5">
    isolated, composable units.
  </text>

  <!-- Hairline rule -->
  <line x1="96" y1="460" x2="600" y2="460" stroke="url(#rule)" stroke-width="1"/>

  <!-- Specs row -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="18" fill="#3a4a40" letter-spacing="1.5">
    <text x="96"  y="500">SWIFT 6.2</text>
    <text x="280" y="500">·</text>
    <text x="310" y="500">iOS 26 / macOS 26</text>
    <text x="610" y="500">·</text>
    <text x="640" y="500">MODELED ON RIBs</text>
    <text x="920" y="500">·</text>
    <text x="950" y="500">APACHE 2.0</text>
  </g>

  <!-- URL footer -->
  <text x="96" y="590" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="20" fill="#1a2520" letter-spacing="1">getnapkin.to</text>
  <text x="1184" y="590" font-family="ui-serif, 'New York', Georgia, serif" font-style="italic" font-size="20" fill="#3a4a40" text-anchor="end">Made with 🌲🌲🌲 in Cascadia</text>

  <!-- Right-side decorative mark: stacked napkin square -->
  <g transform="translate(960, 90)">
    <rect x="0" y="0" width="240" height="240" fill="none" stroke="#356847" stroke-width="2"/>
    <line x1="0" y1="160" x2="160" y2="160" stroke="#356847" stroke-width="2"/>
    <line x1="160" y1="160" x2="160" y2="240" stroke="#356847" stroke-width="2"/>
    <text x="120" y="138" font-family="ui-serif, 'New York', Georgia, serif" font-style="italic" font-size="44" fill="#356847" text-anchor="middle">n</text>
  </g>
</svg>
